<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Брутальная жесткая тень -->
  <circle cx="36" cy="36" r="26" fill="#1A1A1A" />
  
  <!-- Основной круг (оранжевый с черной обводкой) -->
  <circle cx="28" cy="28" r="26" fill="#FF7416" stroke="#1A1A1A" stroke-width="4" />
  
  <!-- Геометрический домик/блок (Изометрия) -->
  <g stroke="#1A1A1A" stroke-width="3.5" stroke-linejoin="round">
    <!-- Верхняя грань (белая) -->
    <path d="M28 14 L16 21 L28 28 L40 21 Z" fill="#FFFFFF" />
    <!-- Левая грань (тёмная) -->
    <path d="M16 21 V 35 L 28 42 V 28 Z" fill="#1A1A1A" />
    <!-- Правая грань (оранжевая, сливается с фоном, но отделена жирной линией) -->
    <path d="M40 21 V 35 L 28 42 V 28 Z" fill="#FF7416" />
  </g>
</svg>