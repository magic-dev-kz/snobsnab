<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Snobsnab Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background-color: #f9fafb; }
    .icon-box { border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 8px; background: white; }
    svg { width: 48px; height: 48px; color: #1A1A1A; }
    svg:hover { color: #FF7416; }
  </style>
</head>
<body class="p-8">
  <h1 class="text-3xl font-bold mb-8 text-[#1A1A1A]">Превью компонентов СнобСнаб</h1>
  
  <h2 class="text-xl font-semibold mb-4 border-l-4 border-[#FF7416] pl-3 text-[#1A1A1A]">Иконки каталога</h2>
  <div class="grid grid-cols-6 gap-4 mb-12">
    <div class="icon-box">
      <!-- Plumbing -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11h16v3a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5v-3z"/><line x1="7" y1="19" x2="7" y2="22"/><line x1="17" y1="19" x2="17" y2="22"/><path d="M4 11V8a2 2 0 0 1 2-2h2"/><circle cx="8" cy="5.5" r="1"/><path d="M8 6.5v1.5"/></svg>
      <span class="text-sm font-medium">Сантехника</span>
    </div>
    <div class="icon-box">
      <!-- Flooring -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="5" rx="0.5"/><rect x="2" y="10" width="20" height="5" rx="0.5"/><rect x="2" y="17" width="20" height="4" rx="0.5"/><line x1="9" y1="3" x2="9" y2="8"/><line x1="16" y1="3" x2="16" y2="8"/><line x1="6" y1="10" x2="6" y2="15"/><line x1="14" y1="10" x2="14" y2="15"/><line x1="10" y1="17" x2="10" y2="21"/><line x1="18" y1="17" x2="18" y2="21"/></svg>
      <span class="text-sm font-medium">Полы</span>
    </div>
    <div class="icon-box">
      <!-- Ceramics -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="9" height="9" rx="0.5"/><rect x="13" y="2" width="9" height="9" rx="0.5"/><rect x="2" y="13" width="9" height="9" rx="0.5"/><rect x="13" y="13" width="9" height="9" rx="0.5"/></svg>
      <span class="text-sm font-medium">Керамика</span>
    </div>
    <div class="icon-box">
      <!-- Paint -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="10" height="5" rx="2.5"/><path d="M15 6.5h3v7h-3"/><line x1="18" y1="13.5" x2="18" y2="18"/><line x1="10" y1="9" x2="10" y2="12"/><rect x="3" y="18" width="14" height="3" rx="0.5"/></svg>
      <span class="text-sm font-medium">Краски</span>
    </div>
    <div class="icon-box">
      <!-- Wallpaper -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="2" width="10" height="14" rx="1"/><ellipse cx="12" cy="2" rx="5" ry="1.5"/><line x1="10" y1="6" x2="14" y2="6"/><line x1="10" y1="9" x2="14" y2="9"/><line x1="10" y1="12" x2="14" y2="12"/><path d="M7 16l-2 5h14l-2-5"/></svg>
      <span class="text-sm font-medium">Обои</span>
    </div>
    <div class="icon-box">
      <!-- Lighting -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="6"/><path d="M7 6h10l-2 8H9L7 6z"/><circle cx="12" cy="12" r="1.5"/><line x1="12" y1="16" x2="12" y2="18"/><line x1="7" y1="15" x2="5.5" y2="16.5"/><line x1="17" y1="15" x2="18.5" y2="16.5"/></svg>
      <span class="text-sm font-medium">Свет</span>
    </div>
  </div>

  <h2 class="text-xl font-semibold mb-4 border-l-4 border-[#FF7416] pl-3 text-[#1A1A1A]">Иконки преимуществ</h2>
  <div class="grid grid-cols-6 gap-4 mb-12">
    <div class="icon-box">
      <!-- Direct -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span class="text-xs text-center">Прямые поставки</span>
    </div>
    <div class="icon-box">
      <!-- Price -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/><line x1="12" y1="15" x2="12" y2="19"/><polyline points="10 17 12 19 14 17"/></svg>
      <span class="text-xs text-center">Цены ниже</span>
    </div>
    <div class="icon-box">
      <!-- Delivery -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/><polyline points="8 3 6 8 9 8 7 13"/></svg>
      <span class="text-xs text-center">Быстрая доставка</span>
    </div>
    <div class="icon-box">
      <!-- Complex -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3 4-4"/><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="8" y1="8" x2="8.01" y2="8"/><line x1="8" y1="12" x2="8.01" y2="12"/><line x1="8" y1="16" x2="8.01" y2="16"/></svg>
      <span class="text-xs text-center">Комплекс</span>
    </div>
    <div class="icon-box">
      <!-- Personal -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><circle cx="19" cy="5" r="2"/><line x1="19" y1="1" x2="19" y2="3"/><line x1="19" y1="7" x2="19" y2="9"/><line x1="15.76" y1="2.76" x2="17.17" y2="4.17"/><line x1="20.83" y1="5.83" x2="22.24" y2="7.24"/></svg>
      <span class="text-xs text-center">Индив. подход</span>
    </div>
    <div class="icon-box">
      <!-- Legal -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/><circle cx="16" cy="17" r="2"/><path d="M14.5 15.5l-1-1"/><path d="M17.5 18.5l1 1"/></svg>
      <span class="text-xs text-center">Для юрлиц</span>
    </div>
  </div>

  <h2 class="text-xl font-semibold mb-4 border-l-4 border-[#FF7416] pl-3 text-[#1A1A1A]">Таймлайн (Десктоп)</h2>
  <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100">
    <div class="relative">
      <div class="absolute top-7 left-[10%] right-[10%] h-px bg-gray-200 z-0"></div>
      
      <div class="relative z-10 flex justify-between">
        <div class="flex flex-col items-center w-1/5 px-2 group">
          <div class="w-14 h-14 rounded-full bg-[#FF7416] border-2 border-[#FF7416] flex items-center justify-center mb-4 shadow-md">
            <span class="text-white font-bold text-sm">01</span>
          </div>
          <svg class="w-6 h-6 mb-3 text-[#FF7416]" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.72 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.63 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          <h3 class="text-base font-bold text-[#1A1A1A] mb-2 text-center">Заявка</h3>
        </div>
        
        <div class="flex flex-col items-center w-1/5 px-2 group">
          <div class="w-14 h-14 rounded-full bg-white border-2 border-[#FF7416] flex items-center justify-center mb-4">
            <span class="text-[#FF7416] font-bold text-sm">02</span>
          </div>
          <svg class="w-6 h-6 mb-3 text-[#1A1A1A] opacity-70" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <h3 class="text-base font-bold text-[#1A1A1A] mb-2 text-center">Консультация</h3>
        </div>

        <div class="flex flex-col items-center w-1/5 px-2 group">
          <div class="w-14 h-14 rounded-full bg-white border-2 border-[#FF7416] flex items-center justify-center mb-4">
            <span class="text-[#FF7416] font-bold text-sm">03</span>
          </div>
          <svg class="w-6 h-6 mb-3 text-[#1A1A1A] opacity-70" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          <h3 class="text-base font-bold text-[#1A1A1A] mb-2 text-center">КП</h3>
        </div>

        <div class="flex flex-col items-center w-1/5 px-2 group">
          <div class="w-14 h-14 rounded-full bg-white border-2 border-[#FF7416] flex items-center justify-center mb-4">
            <span class="text-[#FF7416] font-bold text-sm">04</span>
          </div>
          <svg class="w-6 h-6 mb-3 text-[#1A1A1A] opacity-70" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          <h3 class="text-base font-bold text-[#1A1A1A] mb-2 text-center">Договор</h3>
        </div>

        <div class="flex flex-col items-center w-1/5 px-2 group">
          <div class="w-14 h-14 rounded-full bg-white border-2 border-[#FF7416] flex items-center justify-center mb-4">
            <span class="text-[#FF7416] font-bold text-sm">05</span>
          </div>
          <svg class="w-6 h-6 mb-3 text-[#1A1A1A] opacity-70" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
          <h3 class="text-base font-bold text-[#1A1A1A] mb-2 text-center">Доставка</h3>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
